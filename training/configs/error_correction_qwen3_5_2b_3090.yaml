# Error-Correction Training Configuration
# RTX 3090 oriented defaults for Qwen3.5-2B on the benchmark-clean repair set.

run_name: error_correction_qwen3_5_2b_3090
model_id: Qwen/Qwen3.5-2B
method: lora_sft

# Data paths
train_jsonl: data/training/error_correction/train_error_repair_v1_clean.jsonl
dev_jsonl: data/training/error_correction/dev_error_repair_v1_clean.jsonl
output_dir: runs/error_correction_qwen3_5_2b_3090

# Precision and optimization
load_in_4bit: false
bf16: true
fp16: false
gradient_checkpointing: true
pack: true

# Sequence length
max_seq_len: 2048

# Batch size configuration
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 16
# Effective batch size = 2 * 16 = 32

# Learning rate and scheduler
learning_rate: 1.5e-4
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0

# Training duration
num_train_epochs: 1

# LoRA configuration
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Logging and checkpointing
logging_steps: 25
eval_steps: null
save_steps: 400
save_total_limit: 2

# Reproducibility
seed: 42

# Hardware optimization
dataloader_num_workers: 4
attn_implementation: sdpa
